name: Build and Deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  version-bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: |
      github.ref == 'refs/heads/main' && (
        contains(github.event.head_commit.message, '[patch]') ||
        contains(github.event.head_commit.message, '[minor]') ||
        contains(github.event.head_commit.message, '[major]')
      )
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine bump type
        id: bump
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -q '\[major\]'; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$MSG" | grep -q '\[minor\]'; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Compute next version
        id: version
        run: |
          LATEST=$(git tag --sort=-v:refname | grep '^v[0-9]' | head -n1)
          [ -z "$LATEST" ] && LATEST="v0.0.0"
          VERSION="${LATEST#v}"
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW" >> $GITHUB_OUTPUT
          echo "Bumping $LATEST → $NEW (${{ steps.bump.outputs.type }})"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.new_version }} -m "Release ${{ steps.version.outputs.new_version }}"
          git push origin ${{ steps.version.outputs.new_version }}

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: version-bump
    if: |
      always() && (
        startsWith(github.ref, 'refs/tags/v') ||
        needs.version-bump.result == 'success'
      )

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sunset-angular:latest
            ${{ secrets.DOCKER_USERNAME }}/sunset-angular:${{ needs.version-bump.outputs.new_version || github.ref_name }}
          build-args: |
            APP_VERSION=${{ needs.version-bump.outputs.new_version || github.ref_name }}

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/sunset-angular:latest
            docker stop sunset-angular || true
            docker rm sunset-angular || true
            docker run -d \
              --name sunset-angular \
              --restart unless-stopped \
              -p 127.0.0.1:4000:80 \
              ${{ secrets.DOCKER_USERNAME }}/sunset-angular:latest
