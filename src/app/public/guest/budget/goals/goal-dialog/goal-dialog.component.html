<div class="dialog-container">

    <h2 mat-dialog-title>{{ isEdit ? 'Edit Goal' : 'Add Goal' }}</h2>

    <mat-dialog-content>
        <form [formGroup]="form" class="form-grid">

            <!-- Name -->
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Goal Name</mat-label>
                <input matInput formControlName="name" placeholder="e.g. Emergency Fund">
            </mat-form-field>

            <!-- Target & Saved -->
            <div class="two-col">
                <mat-form-field appearance="outline">
                    <mat-label>Target Amount ($)</mat-label>
                    <input matInput type="number" formControlName="target" placeholder="0.00">
                </mat-form-field>
                <mat-form-field appearance="outline">
                    <mat-label>Amount Saved ($)</mat-label>
                    <input matInput type="number" formControlName="saved" placeholder="0.00">
                </mat-form-field>
            </div>

            <!-- Deadline -->
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Target Date</mat-label>
                <input matInput type="date" formControlName="deadline">
            </mat-form-field>

            <!-- Icon Picker -->
            <div class="field-label">Icon</div>
            <div class="icon-grid">
                <button type="button" *ngFor="let icon of iconOptions"
                    class="icon-btn"
                    [class.selected]="form.value.icon === icon"
                    [style.color]="form.value.icon === icon ? form.value.color : ''"
                    [style.border-color]="form.value.icon === icon ? form.value.color : ''"
                    (click)="selectIcon(icon)">
                    <mat-icon>{{ icon }}</mat-icon>
                </button>
            </div>

            <!-- Color Picker -->
            <div class="field-label mt-3">Color</div>
            <div class="color-grid">
                <button type="button" *ngFor="let color of colorOptions"
                    class="color-swatch"
                    [style.background-color]="color"
                    [class.selected]="form.value.color === color"
                    (click)="selectColor(color)">
                </button>
            </div>

        </form>
    </mat-dialog-content>

    <mat-dialog-actions align="end">
        <button mat-button (click)="cancel()">Cancel</button>
        <button mat-raised-button color="primary" (click)="submit()" [disabled]="form.invalid">
            {{ isEdit ? 'Save' : 'Add Goal' }}
        </button>
    </mat-dialog-actions>

</div>
