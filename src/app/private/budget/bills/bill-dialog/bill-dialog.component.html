<div class="dialog-container">

    <h2 mat-dialog-title>{{ isEdit ? 'Edit Bill' : 'Add Bill' }}</h2>

    <mat-dialog-content>
        <form [formGroup]="form" class="form-grid">

            <!-- Name -->
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Bill Name</mat-label>
                <input matInput formControlName="name" placeholder="e.g. Netflix">
            </mat-form-field>

            <!-- Amount & Due Date -->
            <div class="two-col">
                <mat-form-field appearance="outline">
                    <mat-label>Amount ($)</mat-label>
                    <input matInput type="number" formControlName="amount" placeholder="0.00">
                </mat-form-field>
                <mat-form-field appearance="outline">
                    <mat-label>Due Date</mat-label>
                    <input matInput type="date" formControlName="dueDate">
                </mat-form-field>
            </div>

            <!-- Frequency & Category -->
            <div class="two-col">
                <mat-form-field appearance="outline">
                    <mat-label>Frequency</mat-label>
                    <mat-select formControlName="frequency">
                        <mat-option value="weekly">Weekly</mat-option>
                        <mat-option value="monthly">Monthly</mat-option>
                        <mat-option value="yearly">Yearly</mat-option>
                    </mat-select>
                </mat-form-field>
                <mat-form-field appearance="outline">
                    <mat-label>Category</mat-label>
                    <input matInput formControlName="category" placeholder="e.g. Utilities">
                </mat-form-field>
            </div>

            <!-- Status -->
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Status</mat-label>
                <mat-select formControlName="status">
                    <mat-option value="upcoming">Upcoming</mat-option>
                    <mat-option value="paid">Paid</mat-option>
                    <mat-option value="overdue">Overdue</mat-option>
                </mat-select>
            </mat-form-field>

            <!-- Icon Picker -->
            <div class="field-label">Icon</div>
            <div class="icon-grid">
                <button type="button" *ngFor="let icon of iconOptions"
                    class="icon-btn"
                    [class.selected]="form.value.icon === icon"
                    [style.color]="form.value.icon === icon ? form.value.color : ''"
                    [style.border-color]="form.value.icon === icon ? form.value.color : ''"
                    (click)="selectIcon(icon)">
                    <mat-icon>{{ icon }}</mat-icon>
                </button>
            </div>

            <!-- Color Picker -->
            <div class="field-label mt-3">Color</div>
            <div class="color-grid">
                <button type="button" *ngFor="let color of colorOptions"
                    class="color-swatch"
                    [style.background-color]="color"
                    [class.selected]="form.value.color === color"
                    (click)="selectColor(color)">
                </button>
            </div>

        </form>
    </mat-dialog-content>

    <mat-dialog-actions align="end">
        <button mat-button (click)="cancel()">Cancel</button>
        <button mat-raised-button color="primary" (click)="submit()" [disabled]="form.invalid">
            {{ isEdit ? 'Save' : 'Add Bill' }}
        </button>
    </mat-dialog-actions>

</div>
