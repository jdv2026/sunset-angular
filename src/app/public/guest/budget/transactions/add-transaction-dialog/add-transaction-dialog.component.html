<h2 mat-dialog-title class="flex items-center justify-between">
    <span>Add Transaction</span>
    <button mat-icon-button (click)="cancel()">
        <mat-icon>close</mat-icon>
    </button>
</h2>

<mat-dialog-content>
    <form [formGroup]="form" class="flex flex-col gap-4 pt-2">

        <!-- Date -->
        <mat-form-field appearance="outline" class="w-full">
            <mat-label>Date</mat-label>
            <input matInput [matDatepicker]="picker" formControlName="date" />
            <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
            <mat-error *ngIf="form.get('date')?.hasError('required')">Date is required</mat-error>
        </mat-form-field>

        <!-- Description -->
        <mat-form-field appearance="outline" class="w-full">
            <mat-label>Description</mat-label>
            <input matInput formControlName="description" placeholder="e.g. Grocery Store" />
            <mat-error *ngIf="form.get('description')?.hasError('required')">Description is required</mat-error>
        </mat-form-field>

        <!-- Type & Category row -->
        <div class="flex gap-4">
            <mat-form-field appearance="outline" class="flex-1">
                <mat-label>Type</mat-label>
                <mat-select formControlName="type">
                    <mat-option value="income">Income</mat-option>
                    <mat-option value="expense">Expense</mat-option>
                </mat-select>
                <mat-error *ngIf="form.get('type')?.hasError('required')">Type is required</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="flex-1">
                <mat-label>Category</mat-label>
                <mat-select formControlName="category">
                    <mat-option *ngFor="let cat of categories" [value]="cat">{{ cat }}</mat-option>
                </mat-select>
                <mat-error *ngIf="form.get('category')?.hasError('required')">Category is required</mat-error>
            </mat-form-field>
        </div>

        <!-- Amount & Status row -->
        <div class="flex gap-4">
            <mat-form-field appearance="outline" class="flex-1">
                <mat-label>Amount</mat-label>
                <span matTextPrefix>$ &nbsp;</span>
                <input matInput type="number" formControlName="amount" placeholder="0.00" />
                <mat-error *ngIf="form.get('amount')?.hasError('required')">Amount is required</mat-error>
                <mat-error *ngIf="form.get('amount')?.hasError('min')">Must be greater than 0</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="flex-1">
                <mat-label>Status</mat-label>
                <mat-select formControlName="status">
                    <mat-option *ngFor="let s of statuses" [value]="s">{{ s | titlecase }}</mat-option>
                </mat-select>
                <mat-error *ngIf="form.get('status')?.hasError('required')">Status is required</mat-error>
            </mat-form-field>
        </div>

    </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">Cancel</button>
    <button mat-raised-button color="primary" (click)="submit()">Add</button>
</mat-dialog-actions>
