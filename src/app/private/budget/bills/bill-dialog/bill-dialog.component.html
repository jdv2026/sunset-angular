<div class="dialog-container">

    <h2 mat-dialog-title>{{ isEdit ? 'Edit Bill' : 'Add Bill' }}</h2>

    <mat-dialog-content>
        <form [formGroup]="form" class="form-grid">

            <!-- Name -->
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Bill Name</mat-label>
                <input matInput formControlName="name" placeholder="e.g. Netflix">
            </mat-form-field>

            <!-- Description -->
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Description</mat-label>
                <textarea matInput formControlName="description" placeholder="e.g. Monthly rent payment" rows="2"></textarea>
            </mat-form-field>

            <!-- Amount & Due Date -->
            <div class="two-col">
                <mat-form-field appearance="outline">
                    <mat-label>Amount ($)</mat-label>
                    <input matInput type="number" formControlName="amount" placeholder="0.00">
                </mat-form-field>
                <mat-form-field appearance="outline">
                    <mat-label>Due Date</mat-label>
                    <input matInput type="date" formControlName="due_date">
                </mat-form-field>
            </div>

            <!-- Frequency -->
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Frequency</mat-label>
                <mat-select formControlName="frequency">
                    <mat-option value="weekly">Weekly</mat-option>
                    <mat-option value="monthly">Monthly</mat-option>
                    <mat-option value="yearly">Yearly</mat-option>
                </mat-select>
            </mat-form-field>

            <!-- Category -->
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Category</mat-label>
                <mat-select formControlName="category_id" [compareWith]="compareCategory">
                    <mat-select-trigger>
                        <ng-container *ngIf="selectedCategory; else noCategory">
                            <mat-icon [style.color]="selectedCategory.color" style="vertical-align: middle; margin-right: 6px; font-size: 18px;">{{ selectedCategory.icon }}</mat-icon>
                            {{ selectedCategory.name }}
                        </ng-container>
                        <ng-template #noCategory>None</ng-template>
                    </mat-select-trigger>
                    <mat-option [value]="null">None</mat-option>
                    <mat-option *ngFor="let cat of categories" [value]="cat.id">
                        <mat-icon [style.color]="cat.color" style="vertical-align: middle; margin-right: 6px; font-size: 18px;">{{ cat.icon }}</mat-icon>
                        {{ cat.name }}
                    </mat-option>
                </mat-select>
            </mat-form-field>

        </form>
    </mat-dialog-content>

    <mat-dialog-actions align="end">
        <button mat-button (click)="cancel()">Cancel</button>
        <button mat-raised-button color="primary" (click)="submit()" [disabled]="form.invalid">
            {{ isEdit ? 'Save' : 'Add Bill' }}
        </button>
    </mat-dialog-actions>

</div>
