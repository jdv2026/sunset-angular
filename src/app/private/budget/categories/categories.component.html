<div class="p-6">

    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-6">
        <div>
            <h1 class="text-2xl font-semibold">Categories</h1>
            <p class="text-sm text-gray-500 mt-1">Manage your spending categories</p>
        </div>
        <button mat-raised-button color="primary" (click)="openAdd()">
            <mat-icon class="mr-1">add</mat-icon>
            Add Category
        </button>
    </div>

    <!-- Category Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 items-start">
        <div *ngFor="let cat of categories; let i = index" class="category-card bg-white rounded-lg p-5 shadow-sm border border-gray-100">

            <!-- Card Header -->
            <div class="flex items-start justify-between mb-4">
                <div class="flex items-center gap-3">
                    <div class="icon-wrap" [style.background-color]="cat.color + '1a'" [style.color]="cat.color">
                        <mat-icon>{{ cat.icon }}</mat-icon>
                    </div>
                    <div>
                        <p class="font-semibold text-gray-800">{{ cat.name }}</p>
                    </div>
                </div>
                <div class="flex items-center">
                    <button mat-icon-button (click)="toggleDescription(i)" class="action-btn"
                        [matTooltip]="expandedMap[i] ? 'Hide description' : 'Show description'">
                        <mat-icon>{{ expandedMap[i] ? 'expand_less' : 'expand_more' }}</mat-icon>
                    </button>
                    <button mat-icon-button [matMenuTriggerFor]="menu" class="action-btn" matTooltip="More options">
                        <mat-icon>more_vert</mat-icon>
                    </button>
                </div>
                <mat-menu #menu="matMenu">
                    <button mat-menu-item (click)="openEdit(cat)">
                        <mat-icon>edit</mat-icon>
                        <span>Edit</span>
                    </button>
                    <button mat-menu-item (click)="delete(cat)">
                        <mat-icon>delete</mat-icon>
                        <span>Delete</span>
                    </button>
                </mat-menu>
            </div>

            <!-- Description -->
            <div *ngIf="expandedMap[i]" class="mt-2 text-sm text-gray-500 border-t pt-3">
                {{ cat.description || '—' }}
            </div>

        </div>
    </div>

</div>
