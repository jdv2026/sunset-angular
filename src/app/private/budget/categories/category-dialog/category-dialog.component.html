<h2 mat-dialog-title class="flex items-center justify-between">
    <span>{{ isEdit ? 'Edit' : 'Add' }} Category</span>
    <button mat-icon-button (click)="cancel()">
        <mat-icon>close</mat-icon>
    </button>
</h2>

<mat-dialog-content>
    <form [formGroup]="form" class="flex flex-col gap-5 pt-2">

        <!-- Preview -->
        <div class="preview-wrap">
            <div class="icon-preview" [style.background-color]="form.value.color + '1a'" [style.color]="form.value.color">
                <mat-icon>{{ form.value.icon }}</mat-icon>
            </div>
            <div>
                <p class="font-semibold text-gray-800">{{ form.value.name || 'Category Name' }}</p>
                <p class="text-xs text-gray-400">{{ form.value.color }}</p>
            </div>
        </div>

        <!-- Name -->
        <mat-form-field appearance="outline">
            <mat-label>Name</mat-label>
            <input matInput formControlName="name" placeholder="e.g. Food" />
            <mat-error *ngIf="form.get('name')?.hasError('required')">Name is required</mat-error>
            <mat-error *ngIf="form.get('name')?.hasError('minlength')">At least 3 characters</mat-error>
            <mat-error *ngIf="form.get('name')?.hasError('maxlength')">Max 20 characters</mat-error>
        </mat-form-field>

        <!-- Description -->
        <mat-form-field appearance="outline">
            <mat-label>Description</mat-label>
            <input matInput formControlName="description" placeholder="e.g. Daily meals and groceries" />
            <mat-error *ngIf="form.get('description')?.hasError('maxlength')">Max 20 characters</mat-error>
        </mat-form-field>

        <!-- Color Picker -->
        <div>
            <p class="text-sm text-gray-500 mb-2">Color</p>
            <div class="color-grid">
                <button
                    *ngFor="let c of colors"
                    type="button"
                    class="color-swatch"
                    [style.background-color]="c"
                    [class.selected]="form.value.color === c"
                    (click)="selectColor(c)">
                    <mat-icon *ngIf="form.value.color === c">check</mat-icon>
                </button>
            </div>
        </div>

        <!-- Icon Picker -->
        <div>
            <p class="text-sm text-gray-500 mb-2">Icon</p>
            <div class="icon-grid">
                <button
                    *ngFor="let ic of icons"
                    type="button"
                    class="icon-swatch"
                    [class.selected]="form.value.icon === ic"
                    [style.color]="form.value.icon === ic ? form.value.color : ''"
                    [style.border-color]="form.value.icon === ic ? form.value.color : ''"
                    (click)="selectIcon(ic)">
                    <mat-icon>{{ ic }}</mat-icon>
                </button>
            </div>
        </div>

    </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">Cancel</button>
    <button mat-raised-button color="primary" (click)="submit()">{{ isEdit ? 'Save' : 'Add' }}</button>
</mat-dialog-actions>
