<div class="dialog-container">

    <h2 mat-dialog-title>{{ isEdit ? 'Edit Goal' : 'Add Goal' }}</h2>

    <mat-dialog-content>
        <form [formGroup]="form" class="form-grid">

            <!-- Name -->
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Goal Name</mat-label>
                <input matInput formControlName="name" placeholder="e.g. Emergency Fund">
            </mat-form-field>

            <!-- Description -->
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Description</mat-label>
                <textarea matInput formControlName="description" placeholder="e.g. Save for unexpected expenses" rows="2"></textarea>
            </mat-form-field>

            <!-- Category -->
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Category</mat-label>
                <mat-select formControlName="category_id" [compareWith]="compareCategory">
                    <mat-select-trigger>
                        <ng-container *ngIf="selectedCategory; else noCategory">
                            <mat-icon [style.color]="selectedCategory.color" style="vertical-align: middle; margin-right: 6px; font-size: 18px;">{{ selectedCategory.icon }}</mat-icon>
                            {{ selectedCategory.name }}
                        </ng-container>
                        <ng-template #noCategory>None</ng-template>
                    </mat-select-trigger>
                    <mat-option [value]="null">None</mat-option>
                    <mat-option *ngFor="let cat of categories" [value]="cat.id">
                        <mat-icon [style.color]="cat.color" style="vertical-align: middle; margin-right: 6px; font-size: 18px;">{{ cat.icon }}</mat-icon>
                        {{ cat.name }}
                    </mat-option>
                </mat-select>
            </mat-form-field>

            <!-- Target -->
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Target Amount ($)</mat-label>
                <input matInput type="number" formControlName="target" placeholder="0.00">
            </mat-form-field>

            <!-- Deadline -->
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Target Date</mat-label>
                <input matInput type="date" formControlName="deadline">
            </mat-form-field>

        </form>
    </mat-dialog-content>

    <mat-dialog-actions align="end">
        <button mat-button (click)="cancel()">Cancel</button>
        <button mat-raised-button color="primary" (click)="submit()" [disabled]="form.invalid">
            {{ isEdit ? 'Save' : 'Add Goal' }}
        </button>
    </mat-dialog-actions>

</div>
