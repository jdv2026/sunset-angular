name: Build and Deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Fetch microservice versions
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          AUTH_VERSION=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository_owner }}/pr-auth/tags" \
            | jq -r '.[0].name // "dev"')
          BUDGET_VERSION=$(curl -s -H "Authorization: token $GH_PAT" \
            "https://api.github.com/repos/${{ github.repository_owner }}/pr-budget/tags" \
            | jq -r '.[0].name // "dev"')
          echo "auth_version=$AUTH_VERSION" >> $GITHUB_OUTPUT
          echo "budget_version=$BUDGET_VERSION" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sunset-angular:latest
            ${{ secrets.DOCKER_USERNAME }}/sunset-angular:${{ github.ref_name }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            AUTH_VERSION=${{ steps.versions.outputs.auth_version }}
            BUDGET_VERSION=${{ steps.versions.outputs.budget_version }}

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/sunset-angular:latest
            docker stop sunset-angular || true
            docker rm sunset-angular || true
            docker run -d \
              --name sunset-angular \
              --restart unless-stopped \
              -p 127.0.0.1:4000:80 \
              ${{ secrets.DOCKER_USERNAME }}/sunset-angular:latest
