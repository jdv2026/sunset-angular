<div class="p-4 md:p-6">

    <!-- Header -->
    <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
        <div>
            <h1 class="text-2xl font-semibold">Categories</h1>
            <p class="text-sm text-gray-500 mt-1">Manage your spending categories</p>
        </div>
        <button mat-raised-button color="primary" (click)="openAdd()">
            <mat-icon class="mr-1">add</mat-icon>
            Add Category
        </button>
    </div>

    <!-- Category Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <div *ngFor="let cat of categories" class="category-card bg-white rounded-lg p-5 shadow-sm border border-gray-100">

            <!-- Card Header -->
            <div class="flex items-start justify-between mb-4">
                <div class="flex items-center gap-3">
                    <div class="icon-wrap" [style.background-color]="cat.color + '1a'" [style.color]="cat.color">
                        <mat-icon>{{ cat.icon }}</mat-icon>
                    </div>
                    <div>
                        <p class="font-semibold text-gray-800">{{ cat.name }}</p>
                        <p class="text-xs text-gray-400">{{ cat.budget > 0 ? ('Budget: $' + cat.budget) : 'No budget set' }}</p>
                    </div>
                </div>
                <button mat-icon-button [matMenuTriggerFor]="menu" class="action-btn">
                    <mat-icon>more_vert</mat-icon>
                </button>
                <mat-menu #menu="matMenu">
                    <button mat-menu-item (click)="openEdit(cat)">
                        <mat-icon>edit</mat-icon>
                        <span>Edit</span>
                    </button>
                    <button mat-menu-item (click)="delete(cat.id)">
                        <mat-icon>delete</mat-icon>
                        <span>Delete</span>
                    </button>
                </mat-menu>
            </div>

            <!-- Spent -->
            <div class="flex items-end justify-between mb-2">
                <p class="text-sm text-gray-500">Spent</p>
                <p class="text-sm font-semibold" [style.color]="getProgressColor(cat)">
                    ${{ cat.spent | number:'1.2-2' }}
                    <span *ngIf="cat.budget > 0" class="text-gray-400 font-normal"> / ${{ cat.budget }}</span>
                </p>
            </div>

            <!-- Progress Bar -->
            <div *ngIf="cat.budget > 0" class="progress-track">
                <div class="progress-fill"
                    [style.width.%]="getProgress(cat)"
                    [style.background-color]="getProgressColor(cat)">
                </div>
            </div>

            <!-- Color Dot -->
            <div class="flex items-center gap-2 mt-3">
                <span class="color-dot" [style.background-color]="cat.color"></span>
                <span class="text-xs text-gray-400">{{ cat.color }}</span>
            </div>

        </div>
    </div>

</div>
