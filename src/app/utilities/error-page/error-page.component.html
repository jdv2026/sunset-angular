<div class="min-h-screen flex items-center justify-center px-4 error-page">
	<div class="text-center max-w-md w-full p-6 sm:p-8 rounded-2xl shadow-lg card">
		<h1 class="text-2xl sm:text-3xl md:text-4xl font-bold mb-3">
			{{ title }}
		</h1>
		<p class="text-sm sm:text-base md:text-lg text-muted-foreground mb-6">
			{{ description }}
		</p>
		<div class="flex flex-col sm:flex-row gap-3 justify-center">
			<button
				(click)="goBack()"
				class="btn-home w-full sm:w-auto px-6 py-3 rounded-lg bg-primary text-white font-medium hover:opacity-90 transition">
				Go Back
			</button>
			<button
				(click)="goHome()"
				class="btn-home w-full sm:w-auto px-6 py-3 rounded-lg bg-primary text-white font-medium hover:opacity-90 transition">
				Go Home
			</button>
		</div>
	</div>
</div>
